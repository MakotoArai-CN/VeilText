name: Release

on:
  push:
    branches:
      - main
    paths:
      - 'src/**'
      - 'build.zig'
  workflow_dispatch:

permissions:
  contents: write

env:
  # Zig version used for all build jobs.
  # Project requires 0.16.0 (CLAUDE.md). If this tag isn't yet on
  # ziglang.org's index, fall back to "master".
  ZIG_VERSION: "0.16.0"

jobs:
  get-version:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.get_version.outputs.version }}
      tag_exists: ${{ steps.check_tag.outputs.exists }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get version from config.zig
        id: get_version
        run: |
          VERSION=$(grep -oP 'app_version = "\K[0-9]+\.[0-9]+\.[0-9]+' src/config.zig | head -1)
          echo "version=v${VERSION}" >> $GITHUB_OUTPUT

      - name: Check if tag exists
        id: check_tag
        run: |
          if git rev-parse "${{ steps.get_version.outputs.version }}" >/dev/null 2>&1; then
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "exists=false" >> $GITHUB_OUTPUT
          fi

  # ── Build: Linux + FreeBSD ─────────────────────────────────────
  build-linux:
    needs: get-version
    if: needs.get-version.outputs.tag_exists == 'false'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Zig
        uses: mlugg/setup-zig@v2
        with:
          version: ${{ env.ZIG_VERSION }}

      - name: Build all Linux & FreeBSD targets
        run: zig build dist -Doptimize=ReleaseFast -j2

      - name: Prepare Linux binaries for release
        run: |
          mkdir -p release
          for f in zig-out/bin/Linux/veiltext-*; do
            [ -f "$f" ] || continue
            name=$(basename "$f")
            cp "$f" "release/linux-${name}"
          done

      - name: Prepare FreeBSD binaries for release
        run: |
          for f in zig-out/bin/FreeBSD/veiltext-*; do
            [ -f "$f" ] || continue
            name=$(basename "$f")
            cp "$f" "release/freebsd-${name}"
          done

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: linux-freebsd
          path: release/*
          compression-level: 0

  # ── Build: Windows ─────────────────────────────────────────────
  build-windows:
    needs: get-version
    if: needs.get-version.outputs.tag_exists == 'false'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Zig
        uses: mlugg/setup-zig@v2
        with:
          version: ${{ env.ZIG_VERSION }}

      - name: Build all Windows targets
        run: zig build dist -Doptimize=ReleaseFast -j2

      - name: Prepare Windows binaries for release
        run: |
          mkdir -p release
          for f in zig-out/bin/Windows/veiltext-*.exe; do
            [ -f "$f" ] || continue
            name=$(basename "$f")
            cp "$f" "release/windows-${name}"
          done

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows
          path: release/*
          compression-level: 0

  # ── Build: macOS ───────────────────────────────────────────────
  build-macos:
    needs: get-version
    if: needs.get-version.outputs.tag_exists == 'false'
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Zig
        uses: mlugg/setup-zig@v2
        with:
          version: ${{ env.ZIG_VERSION }}

      - name: Build all macOS targets
        run: zig build dist -Doptimize=ReleaseFast -j2

      - name: Prepare macOS binaries for release
        run: |
          mkdir -p release
          for f in zig-out/bin/MacOS/veiltext-*; do
            [ -f "$f" ] || continue
            name=$(basename "$f")
            cp "$f" "release/macos-${name}"
          done

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: macos
          path: release/*
          compression-level: 0

  # ── Create GitHub Release ──────────────────────────────────────
  release:
    needs: [get-version, build-linux, build-windows, build-macos]
    if: always() && needs.get-version.outputs.tag_exists == 'false'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
        continue-on-error: true

      - name: List artifacts
        run: find artifacts -type f 2>/dev/null || echo "No artifacts found"

      - name: Flatten artifacts
        run: |
          mkdir -p release-files
          find artifacts -type f -exec cp {} release-files/ \;
          ls -la release-files/

      - name: Generate changelog
        id: changelog
        run: |
          PREV_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "")
          if [ -z "$PREV_TAG" ]; then
            COMMITS=$(git log --oneline --pretty=format:"- %s (%h)" | head -50)
          else
            COMMITS=$(git log ${PREV_TAG}..HEAD --oneline --pretty=format:"- %s (%h)")
          fi

          COMMITS=$(echo "$COMMITS" | sed 's/@\([a-zA-Z0-9_-]*\)/`@\1`/g')

          VERSION="${{ needs.get-version.outputs.version }}"
          REPO="${{ github.repository }}"
          BASE_URL="https://github.com/${REPO}/releases/download/${VERSION}"

          {
            echo "CHANGELOG<<EOF"
            echo "## VeilText ${VERSION}"
            echo ""
            echo "Self-hosted text encryption toolkit — single binary, zero dependencies."
            echo ""
            echo "### Changes"
            echo ""
            echo "$COMMITS"
            echo ""
            echo "---"
            echo ""
            echo "### Downloads"
            echo ""
            echo "Raw binaries are uploaded without tar/zip packaging."
            echo "On Linux, macOS, and FreeBSD, you may need to run \`chmod +x <file>\` after downloading."
            echo ""
            echo "#### Linux (glibc)"
            echo ""
            echo "| Architecture | Download |"
            echo "|:-------------|:---------|"
            echo "| x86_64 | [\`linux-veiltext-x86_64\`](${BASE_URL}/linux-veiltext-x86_64) |"
            echo "| aarch64 | [\`linux-veiltext-aarch64\`](${BASE_URL}/linux-veiltext-aarch64) |"
            echo "| x86 | [\`linux-veiltext-x86\`](${BASE_URL}/linux-veiltext-x86) |"
            echo "| arm | [\`linux-veiltext-arm\`](${BASE_URL}/linux-veiltext-arm) |"
            echo "| riscv64 | [\`linux-veiltext-riscv64\`](${BASE_URL}/linux-veiltext-riscv64) |"
            echo "| mips | [\`linux-veiltext-mips\`](${BASE_URL}/linux-veiltext-mips) |"
            echo "| mips64 | [\`linux-veiltext-mips64\`](${BASE_URL}/linux-veiltext-mips64) |"
            echo "| powerpc | [\`linux-veiltext-powerpc\`](${BASE_URL}/linux-veiltext-powerpc) |"
            echo "| powerpc64 | [\`linux-veiltext-powerpc64\`](${BASE_URL}/linux-veiltext-powerpc64) |"
            echo "| powerpc64le | [\`linux-veiltext-powerpc64le\`](${BASE_URL}/linux-veiltext-powerpc64le) |"
            echo "| s390x | [\`linux-veiltext-s390x\`](${BASE_URL}/linux-veiltext-s390x) |"
            echo "| loongarch64 | [\`linux-veiltext-loongarch64\`](${BASE_URL}/linux-veiltext-loongarch64) |"
            echo "| sparc64 | [\`linux-veiltext-sparc64\`](${BASE_URL}/linux-veiltext-sparc64) |"
            echo ""
            echo "#### Linux (musl / static — Alpine, Docker)"
            echo ""
            echo "| Architecture | Download |"
            echo "|:-------------|:---------|"
            echo "| x86_64 | [\`linux-veiltext-x86_64-musl\`](${BASE_URL}/linux-veiltext-x86_64-musl) |"
            echo "| aarch64 | [\`linux-veiltext-aarch64-musl\`](${BASE_URL}/linux-veiltext-aarch64-musl) |"
            echo "| x86 | [\`linux-veiltext-x86-musl\`](${BASE_URL}/linux-veiltext-x86-musl) |"
            echo "| arm | [\`linux-veiltext-arm-musl\`](${BASE_URL}/linux-veiltext-arm-musl) |"
            echo "| riscv64 | [\`linux-veiltext-riscv64-musl\`](${BASE_URL}/linux-veiltext-riscv64-musl) |"
            echo "| mips | [\`linux-veiltext-mips-musl\`](${BASE_URL}/linux-veiltext-mips-musl) |"
            echo "| mips64 | [\`linux-veiltext-mips64-musl\`](${BASE_URL}/linux-veiltext-mips64-musl) |"
            echo "| powerpc | [\`linux-veiltext-powerpc-musl\`](${BASE_URL}/linux-veiltext-powerpc-musl) |"
            echo "| powerpc64 | [\`linux-veiltext-powerpc64-musl\`](${BASE_URL}/linux-veiltext-powerpc64-musl) |"
            echo "| powerpc64le | [\`linux-veiltext-powerpc64le-musl\`](${BASE_URL}/linux-veiltext-powerpc64le-musl) |"
            echo "| s390x | [\`linux-veiltext-s390x-musl\`](${BASE_URL}/linux-veiltext-s390x-musl) |"
            echo "| loongarch64 | [\`linux-veiltext-loongarch64-musl\`](${BASE_URL}/linux-veiltext-loongarch64-musl) |"
            echo ""
            echo "#### Windows"
            echo ""
            echo "| Architecture | Download |"
            echo "|:-------------|:---------|"
            echo "| x86_64 | [\`windows-veiltext-x86_64.exe\`](${BASE_URL}/windows-veiltext-x86_64.exe) |"
            echo "| aarch64 | [\`windows-veiltext-aarch64.exe\`](${BASE_URL}/windows-veiltext-aarch64.exe) |"
            echo "| x86 | [\`windows-veiltext-x86.exe\`](${BASE_URL}/windows-veiltext-x86.exe) |"
            echo ""
            echo "#### macOS"
            echo ""
            echo "| Architecture | Download |"
            echo "|:-------------|:---------|"
            echo "| x86_64 (Intel) | [\`macos-veiltext-x86_64\`](${BASE_URL}/macos-veiltext-x86_64) |"
            echo "| aarch64 (Apple Silicon) | [\`macos-veiltext-aarch64\`](${BASE_URL}/macos-veiltext-aarch64) |"
            echo ""
            echo "#### FreeBSD"
            echo ""
            echo "| Architecture | Download |"
            echo "|:-------------|:---------|"
            echo "| x86_64 | [\`freebsd-veiltext-x86_64\`](${BASE_URL}/freebsd-veiltext-x86_64) |"
            echo "| aarch64 | [\`freebsd-veiltext-aarch64\`](${BASE_URL}/freebsd-veiltext-aarch64) |"
            echo "| x86 | [\`freebsd-veiltext-x86\`](${BASE_URL}/freebsd-veiltext-x86) |"
            echo "| arm | [\`freebsd-veiltext-arm\`](${BASE_URL}/freebsd-veiltext-arm) |"
            echo "| powerpc | [\`freebsd-veiltext-powerpc\`](${BASE_URL}/freebsd-veiltext-powerpc) |"
            echo "| powerpc64 | [\`freebsd-veiltext-powerpc64\`](${BASE_URL}/freebsd-veiltext-powerpc64) |"
            echo "| powerpc64le | [\`freebsd-veiltext-powerpc64le\`](${BASE_URL}/freebsd-veiltext-powerpc64le) |"
            echo "| riscv64 | [\`freebsd-veiltext-riscv64\`](${BASE_URL}/freebsd-veiltext-riscv64) |"
            echo ""
            echo "---"
            echo "EOF"
          } >> $GITHUB_OUTPUT

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ needs.get-version.outputs.version }}
          name: VeilText ${{ needs.get-version.outputs.version }}
          body: ${{ steps.changelog.outputs.CHANGELOG }}
          draft: false
          prerelease: false
          files: release-files/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
